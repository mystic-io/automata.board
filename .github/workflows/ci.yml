name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck Worker
        run: npm run typecheck
      - name: Typecheck runtime harness
        run: npm run typecheck:runtime
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Workerd runtime tests
        run: npm run test:runtime
      - name: Wrangler dry-run bundle
        run: npm run build
