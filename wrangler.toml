name = "automata"
main = "src/index.ts"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "automata-db"
database_id = "e2f3ae5a-e9e9-49c6-9e36-95f955503e56"

# Secrets (set via `wrangler secret put`):
#   X402_PAY_TO

# Durable Object Binding
[[durable_objects.bindings]]
name = "TUNNEL"
class_name = "Automata"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Automata"]

# Cron Triggers (runs every 15 minutes)
# [triggers]
# crons = ["*/15 * * * *"]

# ---------------------------------------------------------------------------
# Production Environment
# ---------------------------------------------------------------------------
[env.production]
[env.production.vars]
ENVIRONMENT = "production"

# [env.production.triggers]
# crons = ["*/15 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "automata-db-prod"
database_id = "e9b5fe2a-2ff9-4838-b5d0-dd698c8a357e"

[[env.production.durable_objects.bindings]]
name = "TUNNEL"
class_name = "Automata"
