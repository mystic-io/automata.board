name = "vivia-api"
main = "src/index.ts"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "vivia-db"
database_id = "6cf9445d-668f-4b59-9d28-31de8d05f19b"

# Secrets (set via `wrangler secret put`):
#   X402_PAY_TO

# Durable Object Binding
[[durable_objects.bindings]]
name = "TUNNEL"
class_name = "GigTunnel"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GigTunnel"]

# Cron Triggers (runs every 15 minutes)
[triggers]
crons = ["*/15 * * * *"]

# ---------------------------------------------------------------------------
# Production Environment
# ---------------------------------------------------------------------------
[env.production]
# Remove `name = "vivia-api"` to allow Wrangler to auto-name it `vivia-api-production`
[env.production.vars]
ENVIRONMENT = "production"

# Production Cron Triggers
[env.production.triggers]
crons = ["*/15 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "vivia-db-prod"
database_id = "b597a8d1-8f9f-4dcd-bdcc-9a8ef55d4412"

[[env.production.durable_objects.bindings]]
name = "TUNNEL"
class_name = "GigTunnel"
